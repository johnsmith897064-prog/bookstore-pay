<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác nhận đơn hàng - BookStore</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; width: 90%; max-width: 400px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 25px; text-align: center; }
        .header { color: #0068ff; font-size: 28px; font-weight: bold; margin-bottom: 10px; }
        .status-badge { background: #fff3cd; color: #856404; padding: 5px 15px; border-radius: 20px; font-size: 14px; display: inline-block; margin-bottom: 20px; }
        .order-info { text-align: left; background: #f8f9fa; padding: 15px; border-radius: 12px; margin-bottom: 25px; border: 1px solid #eee; }
        .order-info p { margin: 8px 0; color: #555; }
        .total-price { font-size: 26px; color: #d9534f; font-weight: bold; margin-top: 10px; display: block; }
        .btn-confirm { background: #0068ff; color: white; border: none; padding: 18px 20px; width: 100%; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-confirm:disabled { background: #ccc; cursor: not-allowed; }
        #success-msg { display: none; margin-top: 20px; }
        .check-icon { font-size: 50px; color: #28a745; }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">BOOK STORE</div>
        <div id="status-tag" class="status-badge">Chờ xác nhận thanh toán</div>
        
        <div id="order-details" class="order-info">
            <p>Mã hóa đơn: <strong id="display-id">---</strong></p>
            <p>Nội dung: <strong>Thanh toán mua sách</strong></p>
            <hr style="border: 0.5px solid #eee;">
            <p>Tổng tiền cần trả:</p>
            <span class="total-price" id="display-total">0đ</span>
        </div>

        <button id="btnConfirm" class="btn-confirm">XÁC NHẬN THANH TOÁN</button>

        <div id="success-msg">
            <div class="check-icon">✔</div>
            <h3 style="color: #28a745;">Thành công!</h3>
            <p>Cảm ơn ông đã mua hàng. Hệ thống tại quầy đang xử lý...</p>
        </div>
    </div>

    <script type="module">
        // Import các hàm cần thiết từ Firebase SDK
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
        import { getDatabase, ref, update } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

        // Cấu hình Database của ông
        const firebaseConfig = {
            databaseURL: "https://nhanqrcode-default-rtdb.asia-southeast1.firebasedatabase.app/"
        };

        // Khởi tạo Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Lấy thông tin từ mã QR (URL)
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id') || 'TEMP_ID';
        const total = urlParams.get('total') || '0';

        // Hiển thị dữ liệu lên giao diện Web
        document.getElementById('display-id').innerText = id;
        document.getElementById('display-total').innerText = Number(total).toLocaleString() + 'đ';

        // Xử lý khi bấm nút Xác nhận
        const btn = document.getElementById('btnConfirm');
        btn.addEventListener('click', () => {
            btn.disabled = true;
            btn.innerText = "Đang xử lý...";

            // Gửi lệnh cập nhật trạng thái lên Firebase
            // Nó sẽ ghi đè vào đường dẫn: orders/MÃ_HD/status = "paid"
            update(ref(db, 'orders/' + id), {
                status: "paid",
                confirmAt: new Date().getTime()
            })
            .then(() => {
                // Hiện thông báo thành công trên web điện thoại
                document.getElementById('order-details').style.display = 'none';
                document.getElementById('status-tag').style.display = 'none';
                btn.style.display = 'none';
                document.getElementById('success-msg').style.display = 'block';
            })
            .catch((error) => {
                alert("Lỗi kết nối Firebase: " + error.message);
                btn.disabled = false;
                btn.innerText = "XÁC NHẬN THANH TOÁN";
            });
        });
    </script>
</body>
</html>
