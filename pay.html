<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác nhận đơn hàng</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; width: 100%; max-width: 400px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); padding: 20px; text-align: center; }
        .logo { font-weight: bold; color: #0068ff; font-size: 24px; margin-bottom: 20px; }
        .info { text-align: left; background: #fafafa; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .total { font-size: 22px; color: #e74c3c; font-weight: bold; }
        .btn { background: #0068ff; color: white; border: none; padding: 15px 20px; width: 100%; border-radius: 10px; font-size: 18px; cursor: pointer; }
        .success { display: none; color: #2ecc71; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card" id="main-card">
        <div class="logo">BOOK STORE</div>
        <h3>CHI TIẾT ĐƠN HÀNG</h3>
        <div class="info">
            <p>Mã đơn: <strong id="order-id">Đang tải...</strong></p>
            <p>Trạng thái: <span>Chờ thanh toán</span></p>
            <hr>
            <p>Tổng tiền:</p>
            <div class="total" id="order-total">0đ</div>
        </div>
        <button class="btn" onclick="confirm()">XÁC NHẬN THANH TOÁN</button>
        <p id="msg" class="success">✔ Đã xác nhận thành công!</p>
    </div>

    <script>
        // Lấy thông tin từ URL (Ví dụ: pay.html?id=H123&total=50000)
        const params = new URLSearchParams(window.location.search);
        document.getElementById('order-id').innerText = params.get('id') || 'HD001';
        document.getElementById('order-total').innerText = Number(params.get('total')).toLocaleString() + 'đ';

        function confirm() {
            document.querySelector('.btn').style.display = 'none';
            document.getElementById('msg').style.display = 'block';
            // Chỗ này nếu có Firebase, ông sẽ gửi lệnh cập nhật lên server ở đây
        }
    </script>
</body>
</html>
